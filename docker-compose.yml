services:
  # Base de données MySQL
  db:
    image: mysql:8.0
    container_name: ecoride_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecoride
      MYSQL_USER: ecoride_user
      MYSQL_PASSWORD: ecoride_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./ecoride.sql:/docker-entrypoint-initdb.d/01_ecoride.sql
      - ./create_site_credits.sql:/docker-entrypoint-initdb.d/02_create_site_credits.sql
      - ./alter_covoiturage.sql:/docker-entrypoint-initdb.d/03_alter_covoiturage.sql
    networks:
      - ecoride
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Serveur Apache + PHP
  app:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: ecoride_app
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    volumes:
      - ./:/var/www/html
    environment:
      - DOCKER_ENV=1
      - DB_HOST=db
      - DB_NAME=ecoride
      - DB_USER=ecoride_user
      - DB_PASS=ecoride_pass
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DB=ecoride
      - MONGO_USER=mongodb_user
      - MONGO_PASS=mongodb_pass
    depends_on:
      db:
        condition: service_healthy
      mongodb:
        condition: service_started
    ports:
      - "8000:80"
    command: >
      sh -c "
      cd /var/www/html &&
      echo 'Répertoire de travail: $$(pwd)' &&
      if [ -f composer.json ]; then
        echo 'composer.json trouvé, installation des dépendances...' &&
        if [ ! -f vendor/autoload.php ] || [ ! -d vendor/symfony ]; then
          echo 'Installation/réinstallation des dépendances Composer...' &&
          rm -rf vendor composer.lock 2>/dev/null || true &&
          composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts &&
          echo 'Dépendances installées avec succès' &&
          chown -R www-data:www-data vendor 2>/dev/null || true &&
          chmod -R 755 vendor 2>/dev/null || true;
        else
          echo 'vendor/autoload.php existe déjà';
        fi
      else
        echo 'ATTENTION: composer.json non trouvé dans /var/www/html';
      fi &&
      /usr/local/bin/init-db.sh &
      apache2-foreground
      "
    networks:
      - ecoride
    restart: unless-stopped

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ecoride_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db
    networks:
      - ecoride
    restart: unless-stopped

  # Base de données MongoDB
  mongodb:
    image: mongo:7.0
    container_name: ecoride_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongodb_user
      MONGO_INITDB_ROOT_PASSWORD: mongodb_pass
      MONGO_INITDB_DATABASE: ecoride
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ecoride
    restart: unless-stopped

volumes:
  mysql_data:
  mongodb_data:

networks:
  ecoride:
    driver: bridge