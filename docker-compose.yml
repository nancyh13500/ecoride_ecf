version: '3.8'

services:
  # Base de données MySQL
  db:
    image: mysql:8.0
    container_name: ecoride_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ecoride}
      MYSQL_USER: ${MYSQL_USER:-ecoride_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ecoride_pass}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./ecoride.sql:/docker-entrypoint-initdb.d/ecoride.sql:ro
    networks:
      - ecoride
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Serveur Apache + PHP
  app:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: ecoride_app
    volumes:
      - ./:/var/www/html
    environment:
      - DOCKER_ENV=1
      - DB_HOST=db
      - DB_NAME=${MYSQL_DATABASE:-ecoride}
      - DB_USER=${MYSQL_USER:-ecoride_user}
      - DB_PASS=${MYSQL_PASSWORD:-ecoride_pass}
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DB=${MONGO_DB:-ecoride}
      - MONGO_USER=${MONGO_USER:-mongodb_user}
      - MONGO_PASS=${MONGO_PASS:-mongodb_pass}
    depends_on:
      db:
        condition: service_healthy
      mongodb:
        condition: service_started
    ports:
      - "${APP_PORT:-8000}:80"
    command: >
      sh -c "
      cd /var/www/html &&
      echo 'Répertoire de travail: $(pwd)' &&
      if [ -f composer.json ]; then
        echo 'composer.json trouvé, vérification des dépendances...' &&
        if [ ! -f vendor/autoload.php ] || [ ! -d vendor/symfony/polyfill-php85 ] || [ ! -d vendor/mongodb ]; then
          echo 'Installation/réinstallation des dépendances Composer...' &&
          composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts &&
          echo 'Dépendances installées avec succès' &&
          chown -R www-data:www-data vendor 2>/dev/null || true &&
          chmod -R 755 vendor 2>/dev/null || true;
        else
          echo 'Dépendances Composer déjà installées';
        fi
      else
        echo 'ATTENTION: composer.json non trouvé dans /var/www/html';
      fi &&
      /usr/local/bin/init-db.sh &
      apache2-foreground
      "
    networks:
      - ecoride
    restart: unless-stopped

  # phpMyAdmin (pour gérer MySQL depuis le navigateur)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ecoride_phpmyadmin
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ecoride
    restart: unless-stopped

  # Base de données MongoDB pour les avis
  mongodb:
    image: mongo:7.0
    container_name: ecoride_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-mongodb_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-mongodb_pass}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-ecoride}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ecoride
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
    driver: local
  mongodb_data:
    driver: local

networks:
  ecoride:
    driver: bridge
