services:
  # Base de données MySQL
  db:
    image: mysql:8.0
    container_name: ecoride_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecoride
      MYSQL_USER: ecoride_user
      MYSQL_PASSWORD: ecoride_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./ecoride.sql:/docker-entrypoint-initdb.d/01_ecoride.sql
      - ./create_site_credits.sql:/docker-entrypoint-initdb.d/02_create_site_credits.sql
      - ./alter_covoiturage.sql:/docker-entrypoint-initdb.d/03_alter_covoiturage.sql
    networks:
      - ecoride
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Serveur Apache + PHP
  app:
    image: nancy13500/ecoride-app:latest
    container_name: ecoride_app
    volumes:
      - ./:/var/www/html
    environment:
      - DOCKER_ENV=1
      - DB_HOST=db
      - DB_NAME=ecoride
      - DB_USER=ecoride_user
      - DB_PASS=ecoride_pass
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:80"
    command: apache2-foreground
    networks:
      - ecoride
    restart: unless-stopped

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ecoride_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db
    networks:
      - ecoride
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  ecoride:
    driver: bridge